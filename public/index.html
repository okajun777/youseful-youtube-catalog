<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ユースフル | Microsoft 365 動画一覧</title>
  <meta name="description" content="ユースフル公式YouTubeのMicrosoft 365製品カテゴリ別動画一覧。新着は36時間「最新」表示。" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="atmosphere" aria-hidden="true">
    <div class="atm-wash"></div>
    <div class="atm-grain"></div>
  </div>

  <div class="site-chrome">
    <div class="site-chrome-inner">
      <header class="site-header">
        <div class="brand-block">
          <div class="brand-row">
            <img class="brand-mark" src="assets/youseful-mark.png" alt="" width="48" height="48" />
            <h1 class="brand">ユースフル</h1>
            <p class="tagline">Microsoft 365 の実務動画を、レベルと製品から探す。</p>
          </div>
        </div>
        <div class="header-meta">
          <a class="channel-link" href="https://www.youtube.com/@youseful_skill" target="_blank" rel="noopener">チャンネルを開く</a>
          <p class="sync-status" id="syncStatus">同期準備中…</p>
        </div>
      </header>

      <section class="toolbar" aria-label="絞り込み">
        <div class="search-wrap">
          <label class="sr-only" for="search">検索</label>
          <input id="search" type="search" placeholder="タイトル・講師名・本名で検索…" autocomplete="off" />
        </div>
        <div class="toolbar-side">
          <div class="sort-wrap">
            <label for="instructorSelect">講師</label>
            <select id="instructorSelect">
              <option value="all">すべて</option>
            </select>
          </div>
          <div class="sort-wrap">
            <label for="sort">並び替え</label>
            <select id="sort">
              <option value="recommend">おすすめ順</option>
              <option value="new">新しい順</option>
              <option value="old">古い順</option>
              <option value="views">再生数順</option>
              <option value="title">タイトル順</option>
            </select>
          </div>
          <button type="button" class="btn-sync" id="btnSync" title="最新データを再読み込み">再読み込み</button>
        </div>
      </section>

      <section class="level-panel" id="levelPanel" aria-label="レベル別おすすめ">
        <div class="level-head">
          <button type="button" class="panel-toggle" id="levelToggle" aria-expanded="true" aria-controls="levels">
            <span class="panel-toggle-label">レベル別おすすめ</span>
            <span class="panel-toggle-meta" id="levelToggleMeta"></span>
            <span class="panel-toggle-chevron" aria-hidden="true"></span>
          </button>
          <p class="level-blurb" id="levelBlurb">自分のレベルに合う動画から始められます。</p>
        </div>
        <nav class="levels" id="levels"></nav>
      </section>

      <section class="category-panel" aria-label="製品カテゴリ">
        <div class="level-head compact">
          <h2 class="level-title">製品カテゴリ</h2>
        </div>
        <nav class="categories" id="categories"></nav>
      </section>
    </div>
  </div>

  <main class="shell">
    <p class="result-meta" id="resultMeta"></p>
    <div class="video-grid" id="videoGrid"></div>
    <p class="empty" id="empty" hidden>該当する動画がありません。</p>
  </main>

  <footer class="site-footer shell">
    <p>データ元: <a href="https://www.youtube.com/@youseful_skill" target="_blank" rel="noopener">ユースフル / 実務変革のプロ</a></p>
    <p>公開から36時間は「最新」バッジを表示。公開サイトは約1時間ごとに自動更新します。</p>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
