<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ユースフル | Microsoft 365 動画一覧</title>
  <meta name="description" content="ユースフル公式YouTubeのMicrosoft 365製品カテゴリ別動画一覧。新着は24時間「最新」表示。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow" aria-hidden="true"></div>

  <header class="site-header">
    <div class="brand-block">
      <p class="brand-eyebrow">YouTube Catalog</p>
      <h1 class="brand">ユースフル</h1>
      <p class="tagline">Microsoft 365 実務変革の動画を、製品カテゴリ別にすぐ見つけられる。</p>
    </div>
    <div class="header-meta">
      <a class="channel-link" href="https://www.youtube.com/@youseful" target="_blank" rel="noopener">チャンネルを開く</a>
      <p class="sync-status" id="syncStatus">同期準備中…</p>
    </div>
  </header>

  <section class="toolbar" aria-label="絞り込み">
    <div class="search-wrap">
      <label class="sr-only" for="search">検索</label>
      <input id="search" type="search" placeholder="タイトルで検索…" autocomplete="off" />
    </div>
    <div class="sort-wrap">
      <label for="sort">並び替え</label>
      <select id="sort">
        <option value="new">新しい順</option>
        <option value="old">古い順</option>
        <option value="views">再生数順</option>
        <option value="title">タイトル順</option>
      </select>
    </div>
    <button type="button" class="btn-sync" id="btnSync" title="最新データを再読み込み">再読み込み</button>
  </section>

  <nav class="categories" id="categories" aria-label="製品カテゴリ"></nav>

  <main>
    <p class="result-meta" id="resultMeta"></p>
    <div class="video-grid" id="videoGrid"></div>
    <p class="empty" id="empty" hidden>該当する動画がありません。</p>
  </main>

  <footer class="site-footer">
    <p>データ元: <a href="https://www.youtube.com/channel/UCRpRQ48LGfMpYojZo7Srabg" target="_blank" rel="noopener">ユースフル / 実務変革のプロ</a></p>
    <p>公開から24時間は「最新」バッジを表示。公開サイトは約30分ごとに自動更新します。</p>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
